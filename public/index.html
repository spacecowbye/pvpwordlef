<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pvpWordle — Duel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Clear+Sans:wght=400;700&family=Outfit:wght=300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #000;
      --panel:  #0b0b0b;
      --border: #1d1d1d;
      --text:   #f4f0ea;
      --muted:  #8b8781;
      --green:  #538d4e;
      --yellow: #b59f3b;
      --gray:   #3a3a3c;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
    }

    /* ── Shell ── */
    .shell {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: 0;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #000;
    }

    .brand {
      font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 14px;
    }
    .brand span { color: #fff; }

    .meta {
      color: var(--muted);
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 0 12px;
      gap: 20px;
      position: relative;
    }

    /* ── Play Screen Screen ── */
    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      animation: fadeIn 0.4s ease;
    }

    .welcome-title {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
      margin: 0;
      text-align: center;
    }

    .welcome-title span {
      color: var(--green);
    }

    .play-btn {
      background: var(--green);
      color: #fff;
      border: none;
      padding: 14px 44px;
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(83, 141, 78, 0.3);
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .play-btn:hover {
      background: #629e5c;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(83, 141, 78, 0.4);
    }

    .play-btn:active {
      transform: translateY(0);
    }

    /* ── Game Content Container ── */
    #game-content {
      display: none; /* Controlled by JS */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Status ── */
    #status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      font-family: monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      margin: 0;
    }

    /* ══════════════════════════════════════
       BOARD
    ══════════════════════════════════════ */
    #game-board {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 5px;
      width: 310px;
    }

    .board-row {
      display: grid;
      grid-template-columns: repeat(5, 58px);
      gap: 5px;
    }

    .tile {
      width: 58px;
      height: 58px;
      position: relative;
    }

    .tile-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.44s ease;
    }
    .tile.flipping .tile-inner {
      transform: rotateX(90deg);
    }

    .tile-face,
    .tile-back {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 4px;
    }

    .tile-face {
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }
    .tile.has-letter .tile-face {
      border-color: #565758;
    }

    .tile-back {
      transform: rotateX(180deg);
      border: 2px solid transparent;
    }

    .tile.correct   .tile-back { background: var(--green);  border-color: var(--green);  color: #fff; }
    .tile.present   .tile-back { background: var(--yellow); border-color: var(--yellow); color: #fff; }
    .tile.absent    .tile-back { background: var(--gray);   border-color: var(--gray);   color: #fff; }

    .tile.revealed .tile-inner { transform: rotateX(180deg); }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .tile.shake { animation: shake 0.4s ease; }

    /* ══════════════════════════════════════
       KEYBOARD
    ══════════════════════════════════════ */
    #keyboard {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .key-row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .key {
      height: 58px;
      min-width: 43px;
      padding: 0 6px;
      border: 1px solid #222;
      background: #1a1a1a;
      color: var(--text);
      border-radius: 10px;
      font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .key.wide { min-width: 65px; font-size: 12px; }

    .key:active { filter: brightness(0.85); }

    .key.correct { background: var(--green);  border-color: var(--green);  color: #fff; }
    .key.present { background: var(--yellow); border-color: var(--yellow); color: #fff; }
    .key.absent  { background: #4a4a4d;       border-color: #4a4a4d;       color: #fff; }

    /* ── Footer ── */
    .footer {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      font-family: monospace;
      text-align: center;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      min-height: 18px;
    }

    @media (max-width: 480px) {
      .shell { padding: 12px; }
      .topbar { padding: 12px 14px; border-radius: 14px; }
      #game-board { width: 270px; }
      .board-row { grid-template-columns: repeat(5, 50px); }
      .tile { width: 50px; height: 50px; }
      .tile-face, .tile-back { font-size: 1.65rem; }
      #keyboard { max-width: 100%; }
      .key { height: 50px; min-width: 35px; font-size: 12px; }
      .key.wide { min-width: 52px; font-size: 11px; }
    }
  </style>
</head>

const ANSWER = WORDS[Math.floor(Math.random() * WORDS.length)].toLowerCase();

let currentRow  = 0;
let currentGuess = '';
let gameOver    = false;
let gameStarted = false; // New state lock

const keyState = new Map();

// Handle Play Screen visibility toggle
document.getElementById('play-button').addEventListener('click', () => {
  //SOCKET STUFF HERE CLIENT SIDE STARTS
  const socket =  io();

  socket.on("connect",()=> {
    console.log("Connected to server with client id",socket.id);
  })
  
  socket.emit("matchmaking:anon:join");
  socket.on("matchmaking:anon:matched",(data) => {
    console.log(`Match found`);
    console.log(data);
  })
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-content').style.display = 'flex';
  gameStarted = true;
});

function getTile(row, col) {
  return document.getElementById(`tile-${row + 1}-${col + 1}`);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function setFooter(msg) {
  document.getElementById('footer').textContent = msg;
}

function paintCurrentRow() {
  for (let c = 0; c < 5; c++) {
    const tile = getTile(currentRow, c);
    const face = tile.querySelector('.tile-face');
    const letter = currentGuess[c] || '';
    face.textContent = letter.toUpperCase();
    tile.classList.toggle('has-letter', !!letter);
  }
}

function addLetter(letter) {
  if (currentGuess.length >= 5) return;
  currentGuess += letter.toLowerCase();
  paintCurrentRow();
}

function deleteLetter() {
  if (!currentGuess.length) return;
  currentGuess = currentGuess.slice(0, -1);
  paintCurrentRow();
}

function shakeCurrentRow() {
  for (let c = 0; c < 5; c++) {
    const tile = getTile(currentRow, c);
    tile.classList.remove('shake');
    void tile.offsetWidth;
    tile.classList.add('shake');
    tile.addEventListener('animationend', () => tile.classList.remove('shake'), { once: true });
  }
}

function evaluate(guess, answer) {
  const result = Array(5).fill('absent');
  const answerLeft = answer.split('');

  for (let i = 0; i < 5; i++) {
    if (guess[i] === answer[i]) {
      result[i] = 'correct';
      answerLeft[i] = null;
    }
  }
  for (let i = 0; i < 5; i++) {
    if (result[i] === 'correct') continue;
    const idx = answerLeft.indexOf(guess[i]);
    if (idx !== -1) {
      result[i] = 'present';
      answerLeft[idx] = null;
    }
  }
  return result;
}

async function revealRow(row, guess, evaluation) {
  return new Promise(resolve => {
    let done = 0;
    for (let c = 0; c < 5; c++) {
      const tile = getTile(row, c);
      const back = tile.querySelector('.tile-back');
      const tone = evaluation[c];

      setTimeout(() => {
        tile.classList.add('flipping');
        back.textContent = guess[c].toUpperCase();

        setTimeout(() => {
          tile.classList.remove('flipping');
          tile.classList.add('revealed', tone);
          const toneLabel = tone === 'correct' ? 'correct position' : tone === 'present' ? 'wrong position' : 'not in word';
          tile.setAttribute('aria-label', `${guess[c].toUpperCase()}: ${toneLabel}`);
          done++;
          if (done === 5) resolve();
        }, 220);
      }, c * 100);
    }
  });
}

function updateKeyboard(guess, evaluation) {
  const priority = { absent: 1, present: 2, correct: 3 };
  for (let i = 0; i < 5; i++) {
    const letter = guess[i].toUpperCase();
    const tone   = evaluation[i];
    const prev   = keyState.get(letter);
    if (!prev || priority[tone] > priority[prev]) {
      keyState.set(letter, tone);
    }
  }
  keyState.forEach((tone, letter) => {
    const btn = document.querySelector(`[data-key="${letter}"]`);
    if (!btn) return;
    btn.classList.remove('correct', 'present', 'absent');
    btn.classList.add(tone);
  });
}

async function submitGuess() {
  if (gameOver) return;
  if (currentGuess.length !== 5) {
    setStatus('Not enough letters.');
    shakeCurrentRow();
    return;
  }
  if (!WORDS.includes(currentGuess)) {
    setStatus('Not in word list.');
    shakeCurrentRow();
    return;
  }

  const evaluation = evaluate(currentGuess, ANSWER);
  const guess = currentGuess;
  currentGuess = '';
  gameOver = true;

  await revealRow(currentRow, guess, evaluation);
  updateKeyboard(guess, evaluation);

  if (evaluation.every(e => e === 'correct')) {
    setStatus(['Brilliant!', 'Magnificent!', 'Impressive!', 'Splendid!', 'Great!', 'Phew!'][currentRow]);
    setFooter(`The word was ${ANSWER.toUpperCase()}.`);
    return;
  }

  currentRow++;

  if (currentRow >= 6) {
    setStatus(`Game over. The word was ${ANSWER.toUpperCase()}.`);
    setFooter('Better luck next time.');
    return;
  }

  gameOver = false;
  setStatus(`Attempt ${currentRow + 1} of 6`);
}

function handleKey(key) {
  if (gameOver || !gameStarted) return; // Verify game has initialized
  const k = key.toUpperCase();
  if (k === 'ENTER')     { submitGuess(); return; }
  if (k === 'BACKSPACE') { deleteLetter(); return; }
  if (/^[A-Z]$/.test(k)) addLetter(k);
}

document.getElementById('keyboard').addEventListener('click', e => {
  const key = e.target.closest('[data-key]')?.dataset.key;
  if (key) handleKey(key);
});

document.addEventListener('keydown', e => {
  if (!gameStarted) return; 
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const key = e.key === 'Backspace' ? 'BACKSPACE'
            : e.key === 'Enter'     ? 'ENTER'
            : e.key.length === 1    ? e.key.toUpperCase()
            : null;
  if (!key) return;
  if (/^[A-Z]$/.test(key) || key === 'ENTER' || key === 'BACKSPACE') {
    e.preventDefault();
    handleKey(key);
  }
});
